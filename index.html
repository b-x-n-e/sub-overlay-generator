<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Twitch Sub Overlay Generator</title>
    <!-- Futuristic Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SUB_OVERLAY</h1>
            <p class="subtitle">GENERATE YOUR OBS ALERT HTML</p>
        </header>
        
        <main class="panel">
            <div class="form-group">
                <label for="channel">TWITCH CHANNEL</label>
                <input type="text" id="channel" placeholder="e.g. ninja" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="media">UPLOAD MEDIA</label>
                <div class="file-drop-area" id="drop-area">
                    <span id="file-name">DROP FILE OR CLICK (GIF/MP4)</span>
                    <input type="file" id="media" accept="image/gif, video/mp4, video/webm">
                </div>
                <p class="note">Media is encoded directly to the HTML file (no server necessary).</p>
            </div>

            <div class="form-row">
                <div class="form-group half">
                    <label for="duration">DURATION (SEC)</label>
                    <input type="number" id="duration" value="5" min="1" max="60">
                </div>
                <div class="form-group half">
                    <label for="text-template">TEMPLATE</label>
                    <input type="text" id="text-template" value="{user} SUBBED" autocomplete="off">
                </div>
            </div>
            
            <div class="actions">
                <button id="generate-btn" class="btn primary">GENERATE OVERLAY HTML</button>
                <button id="test-btn" class="btn outline">PREVIEW</button>
            </div>
        </main>
    </div>

    <!-- Preview Container inside generator -->
    <div id="preview-modal" class="hidden">
        <div class="modal-content">
            <button id="close-preview" class="btn outline small">CLOSE PREVIEW</button>
            <div id="preview-area">
                <div id="alert-box" class="hidden">
                    <div id="media-container"></div>
                    <h2 id="alert-text"></h2>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
